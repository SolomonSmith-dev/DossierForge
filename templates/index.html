<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DossierForge - Dossiers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
    <h1>DossierForge</h1>
    <a href="{{ url_for('new_dossier') }}" class="btn btn-primary mb-3">New Dossier</a>
    <ul class="list-group">
        {% for dossier in dossiers %}
            <li class="list-group-item">
                <a href="{{ url_for('dossier_overview', name=dossier) }}">{{ dossier }}</a>
            </li>
        {% else %}
            <li class="list-group-item">No dossiers found.</li>
        {% endfor %}
    </ul>
</body>
</html>
